name: Deploy to Puter

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: puter-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g @heyputer/cli
      - name: Deploy site
        env:
          PUTER_AUTH_TOKEN: ${{ secrets.PUTER_AUTH_TOKEN }}
          CI: "true"
        run: puter site deploy ./src homestead
