name: Deploy to Puter

# Auto-deploys src/ to homestead.puter.site on every push to main.
#
# Uses scripts/deploy-puter.mjs (the @heyputer/puter.js SDK) rather than
# `puter site deploy`: the CLI (@heyputer/cli@0.1.2) flattens the directory
# tree, dropping every file at the deployment root so nested modules 404.
# The script writes each file to its full nested path, which Puter preserves.
#
# Requires a PUTER_AUTH_TOKEN repository secret (puter.com/dashboard → Create token).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: puter-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install @heyputer/puter.js@^2.5.1
      - name: Deploy site
        env:
          PUTER_AUTH_TOKEN: ${{ secrets.PUTER_AUTH_TOKEN }}
        run: node scripts/deploy-puter.mjs
