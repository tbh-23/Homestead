name: Deploy to Puter

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puter CLI
        run: npm install -g puter-cli

      - name: Deploy src/ to homestead.puter.site
        env:
          PUTER_API_KEY: ${{ secrets.PUTER_API_KEY }}
        run: puter site:deploy ./src --subdomain=homestead
